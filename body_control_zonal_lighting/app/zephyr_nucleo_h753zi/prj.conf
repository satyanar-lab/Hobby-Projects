# ── Language ─────────────────────────────────────────────────────────────────
CONFIG_CPP=y
CONFIG_STD_CPP17=y
# SomeipMessageParser::ParseLampCommand throws std::runtime_error on malformed
# payloads.  Exceptions must be enabled or the throw site becomes k_panic().
CONFIG_CPP_EXCEPTIONS=y
CONFIG_CPP_RTTI=n

# ── C library — Newlib required for full C++ STL (std::vector, std::chrono) ──
CONFIG_NEWLIB_LIBC=y
# 8 KB covers TransportMessage::payload (std::vector) allocations from
# cmd_thread, health_thread, and udp_rx_thread simultaneously with headroom.
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ── Networking ────────────────────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
# POSIX names allow using socket()/bind()/sendto()/recvfrom() without zsock_ prefix.
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_LOG=n

# ── Static IP assignment (192.168.0.20/24, gateway 192.168.0.1) ───────────────
# net_config subsystem applies these before main() runs, so the interface
# is ready when Initialize() opens the UDP socket.
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.0.20"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.0.1"
CONFIG_NET_CONFIG_INIT_TIMEOUT=10

# ── Ethernet driver (NUCLEO-H753ZI: STM32H7 MAC + LAN8742 PHY via RMII) ──────
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_STM32_HAL=y

# ── Logging with timestamps ───────────────────────────────────────────────────
CONFIG_LOG=y
# Deferred mode formats log strings in a low-priority thread, not inline in the
# calling thread.  Prevents log formatting from blocking the blink thread.
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_TIMESTAMP_64BIT=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ── Thread stacks ─────────────────────────────────────────────────────────────
# Stacks are defined with K_THREAD_STACK_DEFINE in main.cpp using these sizes.
# main() only spawns threads; it does not loop, so its stack is minimal.
CONFIG_MAIN_STACK_SIZE=512

# ── Hardware protections ──────────────────────────────────────────────────────
# MPU stack guard pages catch stack overflows immediately at the offending frame.
CONFIG_HW_STACK_PROTECTION=y
# Thread names appear in LOG output at zero runtime cost on H7.
CONFIG_THREAD_NAME=y
CONFIG_REBOOT=y
